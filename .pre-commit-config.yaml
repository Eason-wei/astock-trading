repos:
  - repo: local
    hooks:
      - id: propagation-check
        name: propagation-engine
        entry: python verify/propagation_engine.py --min-confidence 0.8
        language: system
        pass_filenames: false
        always_run: false
        stages: [commit-msg]
        description: "Run propagation engine when morphology_config.json changes"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.10
